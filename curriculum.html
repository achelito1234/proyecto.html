<!DOCTYPE html>

    <style>
        :root {
            --bg-gris: #a8aeb4;
            --bg-blanco: #ffffff;
            --color-titulo: #333333;
            --color-subtitulo: #666666;
            --highlight-pink: #f4e1e1;
            --border-frame: #b39f90;
        }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: #f0f0f0;
            color: var(--color-titulo);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .cv-container {
            width: 794px;
            height: 1123px;
            background-color: var(--bg-blanco);
            display: flex;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* ----- COLUMNA IZQUIERDA ----- */
        .left-column {
            width: 38%;
            background-color: var(--bg-gris);
            padding: 40px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .photo-container img {
            width: 250px;
            height: auto;
            border: 8px solid var(--bg-blanco);
            outline: 2px solid var(--border-frame);
            margin-bottom: 40px;
        }

        .left-column h2 {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            background-color: var(--bg-blanco);
            padding: 8px 25px;
            border-radius: 25px;
            margin-bottom: 20px;
        }

        /* ----- COLUMNA DERECHA ----- */
        .right-column {
            width: 62%;
            padding: 60px 40px;
            box-sizing: border-box;
        }

        header {
            text-align: right;
            margin-bottom: 50px;
        }

        header h1 {
            font-family: 'Playfair Display SC', serif;
            font-size: 3.8rem;
            margin: 0;
            line-height: 0.9;
        }

        .section-title {
            font-size: 1rem;
            text-transform: uppercase;
            background-color: var(--highlight-pink);
            padding: 10px 15px;
            border-radius: 4px;
            margin-bottom: 30px;
            font-weight: 700;
        }

        /* --- NUEVOS FORMATOS DE IMAGEN --- */
        .item-row {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
        }

        /* Imagen de la escuela */
        .img-school {
            width: 90px;
            height: 70px;
            object-fit: cover; /* Ajusta la foto al cuadro */
            border-radius: 6px;
            margin-right: 20px;
            border: 2px solid #eee;
        }

        /* Logo de Coursera */
        .img-logo {
            width: 45px;
            height: 45px;
            object-fit: contain;
            margin-right: 20px;
        }

        .info-content h3 {
            margin: 0;
            font-size: 1rem;
            text-transform: uppercase;
        }

        .info-content p {
            margin: 2px 0;
            font-size: 0.9rem;
            color: var(--color-subtitulo);
        }

        .dates {
            font-weight: 700;
            font-size: 0.8rem !important;
        }
    </style>
</head>
